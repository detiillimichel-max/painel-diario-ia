<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Diário de Luxo</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <main class="area-conteudo">
        <h1 class="saudacao"></h1>
    </main>

    <section class="area-interacao">
        
        <div class="pilula-input efeito-vidro">
            <button class="btn-icone"><i class="ph ph-plus"></i></button>
            <input type="text" id="entradaUsuario" placeholder="Pergunte ao assistente" autocomplete="off">
            <button class="btn-icone"><i class="ph ph-microphone"></i></button>
            <button class="btn-voz-destaque"><i class="ph ph-waveform"></i></button>
        </div>

        <nav class="navegacao-inferior">
            <div class="nav-pilula efeito-vidro">
                <button class="nav-item ativo">
                    <i class="ph-fill ph-house"></i>
                    <span>Início</span>
                </button>
                <button class="nav-item">
                    <i class="ph ph-compass"></i>
                    <span>Descobrir</span>
                </button>
                <button class="nav-item">
                    <i class="ph ph-books"></i>
                    <span>Biblioteca</span>
                </button>
            </div>
            
            <button class="btn-flutuante-extra efeito-vidro">
                <i class="ph ph-chat-teardrop-dots"></i>
            </button>
        </nav>

    </section>

    <script src="js/main.js"></script>

</body>
</html>
